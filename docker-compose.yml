# Production-oriented stack for the e-commerce monorepo.
#
# Usage:
#   cp .env.example .env
#   # Edit .env with strong secrets and public URLs
#   docker compose build
#   docker compose up -d
#
# Services:
#   - postgres   PostgreSQL 16
#   - api        Express API (port 5000)
#   - dashboard  Admin Next.js (port 3000)
#   - store      Storefront Next.js (port 3001)

name: ecommerce

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  api:
    build:
      context: ./api/clean-ecomarce-API
      dockerfile: Dockerfile
    container_name: ecommerce-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      FRONTEND_URL: ${PUBLIC_DASHBOARD_URL}
      STORE_URL: ${PUBLIC_STORE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '5000:5000'
    networks:
      - backend
      - frontend
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://127.0.0.1:5000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

  dashboard:
    build:
      context: ./front/green-dashboard-v2
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: ecommerce-dashboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '3000:3000'
    networks:
      - frontend
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  store:
    build:
      context: ./store
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: ecommerce-store
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
      # Server-side fetches from the storefront container to the API service
      API_INTERNAL_URL: http://api:5000/api/v1
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '3001:3001'
    networks:
      - frontend
      - backend
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3001/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

volumes:
  postgres_data:
    driver: local
